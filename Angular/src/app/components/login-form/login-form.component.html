<body>

    <div class="main">
        <div class="img-div">
            <img class="img-login" src="img/login-img-denovo.png" alt="">
        </div>

        <div class="formulario">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmitLogin()" class="login-forms">
    
                <div class="logo-div">
                </div>
                <img class="logo" src="img/ford-logo-sim.png" alt="">
    
                <h2>Ford Motor Company</h2>
    
                <div class="usuario-forms">
                    <label for="usuario-login" class="usuario-label">Seu Usuário</label>
    
                    <div class="input-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-person input-icon" viewBox="0 0 16 16">
                            <path
                                d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z" />
                        </svg>
    
                        <input formControlName="nome" type="text" class="usuario-input" id="usuario-login"
                            placeholder="usuário123" required>
                    </div>
                </div>
    
                <div class="senha-forms">
                    <label for="senha-login" class="senha-label">Sua Senha</label>
    
                    <div class="input-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-lock input-icon" viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4M4.5 7A1.5 1.5 0 0 0 3 8.5v5A1.5 1.5 0 0 0 4.5 15h7a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 11.5 7zM8 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3" />
                        </svg>
    
                        <input formControlName="senha" type="password" class="senha-input" id="senha-login"
                            placeholder="********" required>
                    </div>
                </div>
    
                <!-- <div class="mb-3 form-check form-switch d-flex align-items-center justify-content-between">
                    <label class="form-check-label m-0 text-muted" for="switchLembrar">
                            Lembrar de mim.
                    </label>
                    <input class="form-check-input style-switch" type="checkbox" id="switchLembrar"
                        formControlName="lembrar">
                </div> -->
    
                <div class="btn-forms">
                    <button type="submit" class="entrar-btn">Entrar</button>
                </div>
    
                <p class="dados">Salvaremos seus dados.
                    <a href="https://www.ford.com.br/politica-de-privacidade/" target="_blank">Termos e Condições</a>
                </p>

            </form>
        </div>
    </div>

</body>
