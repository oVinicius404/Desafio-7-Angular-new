<body>

    <div class="head">
        <img class="logo" src="img/ford-logo.png" alt="">
        <div class="btn-div">
            <button class="menu-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample"
                aria-controls="offcanvasExample">
                Menu
            </button>
        </div>
    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasExampleLabel"><img class="logo-dentro" src="img/ford-96.png"
                    alt=""></h5>
            <!-- <button type="button" class="btn-fechar btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button> -->
        </div>
        <div class="offcanvas-body">
            <button class="home-btn" (click)="goToHome()">Home</button>
            <button (click)="logout()" class="logout-btn">Sair</button>
        </div>
        <div class="redes">
            <p>Redes Sociais</p>

            <div class="social_img">
                <a target="_blank" href="https://www.facebook.com/FordBrasil/?locale=pt_BR"><img
                        src="img/facebook-50.png" alt="Facebook Logo" class="social_links"></a>
                <a target="_blank" href="http://youtube.com/@fordbrasil"><img src="img/youtube-squared-50.png"
                        alt="YouTube Logo" class="social_links"></a>
                <a target="_blank" href="https://www.instagram.com/fordbrasil/"><img src="img/instagram-logo-50.png"
                        alt="Instagram Logo" class="social_links"></a>
            </div>
        </div>
    </div>

    <section class="dashboard-tudo">
        <div class="tabela">
            <div class="veiculos">
                <h2>Veículos</h2>
            </div>
            <div class="seletor">
                <select (change)="onChangeSelect($event)">
                    @for (v of veiculos; track v.id) {
                    <option value="{{ v.id }}">{{ v.vehicle }}</option>
                    }
                </select>
            </div>
        </div>

        <app-card [titulo]="'Total de Vendas'" [valor]="veiculoSelecionado.volumetotal" />
        <app-card [titulo]="'Conectados'" [valor]="veiculoSelecionado.connected" />
        <app-card [titulo]="'Upd. Software'" [valor]="veiculoSelecionado.softwareUpdates" />
    </section>
    <section class="carro-div">
        <img class="carro-img" src="{{ veiculoSelecionado.img }}" alt="">
    </section>

    <div class="copyright">
        <P>&copy; 2026 Ford Brasil | Viva o Novo. Todos os direitos reservados.</P>
    </div>

    <section>
        <app-car-table [vin]="veiculoSelecionado.vin" [odometro]="vinInfos.odometro"
            [nivelCombustivel]="vinInfos.nivelCombustivel" [status]="vinInfos.status" [lat]="vinInfos.lat"
            [long]="vinInfos.long" />
    </section>

</body>
